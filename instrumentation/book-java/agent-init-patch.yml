# ================================================================
# OTel Java Agent — Init Container Patch
# Injects opentelemetry-javaagent.jar into the book Rollout
# Apply as a strategic merge patch or inline into your Rollout spec
# ================================================================
#
# Merge the sections below into your existing book Rollout template:
#
# spec.template.spec:

initContainers:
  - name: otel-agent-init
    image: ghcr.io/open-telemetry/opentelemetry-java-instrumentation/opentelemetry-javaagent:v2.4.0
    imagePullPolicy: IfNotPresent
    command: ["cp", "/javaagent.jar", "/otel/opentelemetry-javaagent.jar"]
    volumeMounts:
      - name: otel-agent
        mountPath: /otel

volumes:
  - name: otel-agent
    emptyDir: {}
  - name: tmp
    emptyDir: {}

