          for: 15m
          labels:
            severity: warning
            service: search
            slo: availability
            window: medium
          annotations:
            summary: "Search service medium burn rate (6×)"
            description: "Error rate {{ $value | humanizePercentage }} — exhausting monthly budget in ~5 days."
            runbook_url: "https://github.com/SurendraKumar17/k8s-observability-platform/blob/main/runbooks/slo-breach.md"

        - alert: SLOSearchSlowBurn
          expr: |
            (1 - slo:search_availability:ratio_rate1h) > (3 * 0.001)
            and
