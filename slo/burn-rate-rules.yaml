            (1 - slo:user_availability:ratio_rate1h)  > (6 * 0.001)
            and
            (1 - slo:user_availability:ratio_rate6h)  > (6 * 0.001)
          for: 15m
          labels:
            severity: warning
            service: user
            slo: availability
            window: medium
          annotations:
            summary: "User service medium burn rate (6×)"
            description: "Error rate {{ $value | humanizePercentage }} — exhausting monthly budget in ~5 days."
            runbook_url: "https://github.com/SurendraKumar17/k8s-observability-platform/blob/main/runbooks/slo-breach.md"

        - alert: SLOUserSlowBurn
          expr: |
            (1 - slo:user_availability:ratio_rate1h)  > (3 * 0.001)
            and
            (1 - slo:user_availability:ratio_rate6h)  > (3 * 0.001)
          for: 60m
          labels:
            severity: warning
            service: user
            slo: availability
            window: slow
          annotations:
            summary: "User service slow burn rate (3×)"
            description: "Error rate {{ $value | humanizePercentage }} — exhausting monthly budget in ~10 days."
            runbook_url: "https://github.com/SurendraKumar17/k8s-observability-platform/blob/main/runbooks/slo-breach.md"

        - alert: SLOUserLatencyBurn
          expr: slo:user_latency_500ms:ratio_rate5m < 0.95
          for: 5m
          labels:
            severity: warning
            service: user
            slo: latency
          annotations:
