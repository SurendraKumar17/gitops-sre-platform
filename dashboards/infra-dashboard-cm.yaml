apiVersion: v1
kind: ConfigMap
metadata:
  name: infra-dashboard
  namespace: observability
  labels:
    grafana_dashboard: "1"
data:
  infra-dashboard.json: |
    {
      "title": "Booking Platform – Infrastructure",
      "uid": "booking-infra",
      "tags": ["booking", "infrastructure", "kubernetes"],
      "schemaVersion": 38,
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "namespace",
            "type": "query",
            "query": "label_values(kube_pod_info, namespace)",
            "label": "Namespace",
            "current": { "value": "default" }
          },
          {
            "name": "pod",
            "type": "query",
            "query": "label_values(kube_pod_info{namespace=\"$namespace\"}, pod)",
            "label": "Pod",
            "multi": true,
            "includeAll": true
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "Pod CPU Usage",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 0, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"$namespace\", pod=~\"$pod\", container!=\"\", container!=\"POD\"}[5m])) by (pod)",
              "legendFormat": "{{ pod }}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "cores", "color": { "mode": "palette-classic" } }
          }
        },
        {
          "id": 2,
          "title": "Pod Memory (Working Set)",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 0, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "sum(container_memory_working_set_bytes{namespace=\"$namespace\", pod=~\"$pod\", container!=\"\", container!=\"POD\"}) by (pod)",
              "legendFormat": "{{ pod }}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "bytes", "color": { "mode": "palette-classic" } }
          }
        },
        {
          "id": 3,
          "title": "Pod Restarts",
          "type": "stat",
          "gridPos": { "x": 0, "y": 8, "w": 6, "h": 4 },
          "targets": [
            {
              "expr": "sum(kube_pod_container_status_restarts_total{namespace=\"$namespace\"}) by (pod, container)",
              "legendFormat": "{{ pod }}/{{ container }}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "short", "thresholds": { "steps": [
              { "value": 0, "color": "green" },
              { "value": 3, "color": "yellow" },
              { "value": 10, "color": "red" }
            ]}}
          }
        },
        {
          "id": 4,
          "title": "Ready Pods per Service",
          "type": "stat",
          "gridPos": { "x": 6, "y": 8, "w": 18, "h": 4 },
          "targets": [
            {
              "expr": "sum(kube_pod_status_ready{namespace=\"$namespace\", condition=\"true\", pod=~\".*-book-.*\"}) ",
              "legendFormat": "book"
            },
            {
              "expr": "sum(kube_pod_status_ready{namespace=\"$namespace\", condition=\"true\", pod=~\".*-frontend-.*\"})",
              "legendFormat": "frontend"
            },
            {
              "expr": "sum(kube_pod_status_ready{namespace=\"$namespace\", condition=\"true\", pod=~\".*-search-.*\"})",
              "legendFormat": "search"
            },
            {
              "expr": "sum(kube_pod_status_ready{namespace=\"$namespace\", condition=\"true\", pod=~\".*-user-.*\"})",
              "legendFormat": "user"
            }
          ]
        },
        {
          "id": 5,
          "title": "Network I/O",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 12, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "sum(rate(container_network_receive_bytes_total{namespace=\"$namespace\", pod=~\"$pod\"}[5m])) by (pod)",
              "legendFormat": "rx {{ pod }}"
            },
            {
              "expr": "sum(rate(container_network_transmit_bytes_total{namespace=\"$namespace\", pod=~\"$pod\"}[5m])) by (pod)",
              "legendFormat": "tx {{ pod }}"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "Bps" } }
        },
        {
          "id": 6,
          "title": "HPA Scaling Events",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 12, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "kube_horizontalpodautoscaler_status_current_replicas{namespace=\"$namespace\"}",
              "legendFormat": "current {{ horizontalpodautoscaler }}"
            },
            {
              "expr": "kube_horizontalpodautoscaler_spec_max_replicas{namespace=\"$namespace\"}",
              "legendFormat": "max {{ horizontalpodautoscaler }}"
            }
          ]
        }
      ]
    }