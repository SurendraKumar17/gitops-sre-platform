apiVersion: v1
kind: ConfigMap
metadata:
  name: application-dashboard
  namespace: observability
  labels:
    grafana_dashboard: "1"
data:
  application-dashboard.json: |
    {
      "title": "Booking Platform - Application Overview",
      "uid": "booking-application",
      "tags": ["application", "booking", "microservices"],
      "schemaVersion": 39,
      "refresh": "15s",
      "time": { "from": "now-30m", "to": "now" },
      "timezone": "",
      "editable": true,
      "graphTooltip": 0,
      "style": "dark",
      "__inputs": [],
      "__requires": [],
      "annotations": {
        "list": []
      },
      "templating": {
        "list": [
          {
            "name": "namespace",
            "type": "constant",
            "label": "Namespace",
            "query": "app-dev",
            "current": { "text": "app-dev", "value": "app-dev" },
            "hide": 2
          },
          {
            "name": "service",
            "type": "query",
            "label": "Service",
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "query": "label_values(up{namespace=\"$namespace\"}, job)",
            "refresh": 2,
            "includeAll": true,
            "multi": true,
            "current": { "text": "All", "value": "$__all" }
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "HTTP Request Rate by Service",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 0, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "reqps" }
          },
          "targets": [
            {
              "expr": "sum(rate(http_request_duration_seconds_count{namespace=\"$namespace\", job=~\"$service\"}[5m])) by (job)",
              "legendFormat": "{{job}}"
            },
            {
              "expr": "sum(rate(http_server_requests_seconds_count{namespace=\"$namespace\", job=~\"$service\"}[5m])) by (job)",
              "legendFormat": "{{job}}"
            }
          ]
        },
        {
          "id": 2,
          "title": "Average Response Time by Service",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 0, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "s" }
          },
          "targets": [
            {
              "expr": "sum(rate(http_request_duration_seconds_sum{namespace=\"$namespace\", job=~\"$service\"}[5m])) by (job) / sum(rate(http_request_duration_seconds_count{namespace=\"$namespace\", job=~\"$service\"}[5m])) by (job)",
              "legendFormat": "{{job}}"
            }
          ]
        },
        {
          "id": 3,
          "title": "5xx Error Rate by Service",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 8, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "reqps" }
          },
          "targets": [
            {
              "expr": "sum(rate(http_request_duration_seconds_count{namespace=\"$namespace\", job=~\"$service\", status_code=~\"5..\"}[5m])) by (job)",
              "legendFormat": "{{job}}"
            },
            {
              "expr": "sum(rate(http_server_requests_seconds_count{namespace=\"$namespace\", job=~\"$service\", status=~\"5..\"}[5m])) by (job)",
              "legendFormat": "{{job}}"
            }
          ]
        },
        {
          "id": 4,
          "title": "Error % by Service",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 8, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "percent", "max": 100, "min": 0 }
          },
          "targets": [
            {
              "expr": "100 * sum(rate(http_request_duration_seconds_count{namespace=\"$namespace\", job=~\"$service\", status_code=~\"5..\"}[5m])) by (job) / sum(rate(http_request_duration_seconds_count{namespace=\"$namespace\", job=~\"$service\"}[5m])) by (job)",
              "legendFormat": "{{job}}"
            }
          ]
        },
        {
          "id": 5,
          "title": "Recent Application Logs",
          "type": "logs",
          "gridPos": { "x": 0, "y": 16, "w": 12, "h": 8 },
          "datasource": { "type": "loki", "uid": "loki" },
          "targets": [
            {
              "expr": "{namespace=\"$namespace\"}"
            }
          ]
        },
        {
          "id": 6,
          "title": "Error Logs Only",
          "type": "logs",
          "gridPos": { "x": 12, "y": 16, "w": 12, "h": 8 },
          "datasource": { "type": "loki", "uid": "loki" },
          "targets": [
            {
              "expr": "{namespace=\"$namespace\"} |~ \"(?i)error|exception|fail\""
            }
          ]
        },
        {
          "id": 7,
          "title": "Recent Traces",
          "type": "traces",
          "gridPos": { "x": 0, "y": 24, "w": 24, "h": 10 },
          "datasource": { "type": "tempo", "uid": "tempo" },
          "targets": [
            { "queryType": "search" }
          ]
        },
        {
          "id": 8,
          "title": "Pod Restarts by Service",
          "type": "stat",
          "gridPos": { "x": 0, "y": 34, "w": 6, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(kube_pod_container_status_restarts_total{namespace=\"$namespace\"}) by (pod)"
            }
          ]
        },
        {
          "id": 9,
          "title": "Active Pods by Service",
          "type": "stat",
          "gridPos": { "x": 6, "y": 34, "w": 6, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "count(kube_pod_info{namespace=\"$namespace\"}) by (created_by_name)"
            }
          ]
        },
        {
          "id": 10,
          "title": "CPU Usage by Pod",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 34, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "short" }
          },
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{namespace=\"$namespace\"}[5m])) by (pod)",
              "legendFormat": "{{pod}}"
            }
          ]
        },
        {
          "id": 11,
          "title": "Memory Usage by Pod",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 42, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": { "unit": "bytes" }
          },
          "targets": [
            {
              "expr": "sum(container_memory_working_set_bytes{namespace=\"$namespace\"}) by (pod)",
              "legendFormat": "{{pod}}"
            }
          ]
        }
      ],
      "version": 1
    }