apiVersion: v1
kind: ConfigMap

metadata:
  name: application-dashboard
  namespace: observability
  labels:
    grafana_dashboard: "1"

data:
  application-dashboard.json: |
    {
      "__inputs": [],
      "__requires": [],
      "annotations": {
        "list": []
      },
      "editable": true,
      "graphTooltip": 0,
      "panels": [],
      "refresh": "30s",
      "schemaVersion": 39,
      "style": "dark",
      "tags": [
        "application"
      ],
      "templating": {
        "list": []
      },
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "timezone": "",
      "title": "Application Dashboard",
      "version": 1
    }