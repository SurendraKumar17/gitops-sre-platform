apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: promtail
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: promtail
    targetRevision: "6.15.5"
    helm:
      values: |
        ## ── DaemonSet — runs on every node ───────────────────
        daemonset:
          enabled: true

        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi

        ## ── Push logs to Loki gateway ─────────────────────────
        config:
          logLevel: warn
          serverPort: 3101

          clients:
            - url: http://loki-gateway.observability.svc.cluster.local/loki/api/v1/push
              tenant_id: "1"
              backoff_config:
                min_period: 500ms
                max_period: 5m
                max_retries: 10

          snippets:
            ## ── Scrape all pods in booking-staging ────────────
            scrapeConfigs: |
              - job_name: booking-staging-pods
                kubernetes_sd_configs:
                  - role: pod
                    namespaces:
                      names:
                        - booking-staging
                relabel_configs:
                  # Only scrape pods that are running
                  - source_labels: [__meta_kubernetes_pod_phase]
                    action: keep
                    regex: Running

                  # Use pod namespace as label
                  - source_labels: [__meta_kubernetes_namespace]
                    target_label: namespace

                  # Use app label as service name
                  - source_labels: [__meta_kubernetes_pod_label_app]
                    target_label: app

                  # Pod name
                  - source_labels: [__meta_kubernetes_pod_name]
                    target_label: pod

                  # Container name
                  - source_labels: [__meta_kubernetes_pod_container_name]
                    target_label: container

                  # Node name
                  - source_labels: [__meta_kubernetes_pod_node_name]
                    target_label: node

                  # Rollout hash for canary tracking
                  - source_labels: [__meta_kubernetes_pod_label_rollouts_pod_template_hash]
                    target_label: rollouts_pod_template_hash

                  # Set path to pod logs
                  - source_labels: [__meta_kubernetes_pod_uid, __meta_kubernetes_pod_container_name]
                    target_label: __path__
                    replacement: /var/log/pods/*$1*/$2/*.log

                pipeline_stages:
                  # Parse JSON logs (Node.js winston + Java ECS format)
                  - json:
                      expressions:
                        level: level
                        message: message
                        traceId: trace.id
                        spanId: span.id
                        service: service

                  # Promote log level as label
                  - labels:
                      level:
                      service:

                  # Extract trace ID for Tempo correlation
                  - labeldrop:
                      - filename

              ## ── Scrape observability namespace ────────────────
              - job_name: observability-pods
                kubernetes_sd_configs:
                  - role: pod
                    namespaces:
                      names:
                        - observability
                relabel_configs:
                  - source_labels: [__meta_kubernetes_pod_phase]
                    action: keep
                    regex: Running
                  - source_labels: [__meta_kubernetes_namespace]
                    target_label: namespace
                  - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
                    target_label: app
                  - source_labels: [__meta_kubernetes_pod_name]
                    target_label: pod
                  - source_labels: [__meta_kubernetes_pod_container_name]
                    target_label: container
                  - source_labels: [__meta_kubernetes_pod_uid, __meta_kubernetes_pod_container_name]
                    target_label: __path__
                    replacement: /var/log/pods/*$1*/$2/*.log

        ## ── RBAC — needs pod/node read access ────────────────
        rbac:
          create: true
          pspEnabled: false

        serviceAccount:
          create: true
          name: promtail

        ## ── Tolerations — scrape all nodes including tainted ──
        tolerations:
          - key: node-role.kubernetes.io/master
            operator: Exists
            effect: NoSchedule
          - key: node-role.kubernetes.io/control-plane
            operator: Exists
            effect: NoSchedule

        ## ── ServiceMonitor for Prometheus ─────────────────────
        serviceMonitor:
          enabled: true
          labels:
            release: kube-prometheus-stack