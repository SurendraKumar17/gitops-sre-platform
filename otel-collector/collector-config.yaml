## ============================================================
## OTel Collector — collector-config.yaml
## Receives: OTLP gRPC/HTTP from all 6 services
##           (auth-service, frontend, notification-service,
##            search-service, payment-service, booking-service)
## Exports:  Traces → Tempo | Logs → Loki | Metrics → Prometheus
##
## NOTE: this collector is service-agnostic by design - it accepts
## OTLP data from any pod sending it, with no hardcoded service list
## anywhere in receivers/processors/pipelines below. Adding a 7th
## service later needs no changes here at all, only that service's
## own OTel SDK instrumentation needs to point at this collector's
## endpoint.
## ============================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: observability
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

      # Scrape its own metrics
      prometheus:
        config:
          scrape_configs:
            - job_name: otel-collector
              scrape_interval: 15s
              static_configs:
                - targets: [localhost:8888]

    processors:
      # Batch for efficiency
      batch:
        send_batch_size: 1000
        timeout: 5s
        send_batch_max_size: 1500

      # Add k8s metadata to all signals
      k8sattributes:
        auth_type: serviceAccount
        passthrough: false
        filter:
          node_from_env_var: NODE_NAME
        extract:
          metadata:
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.deployment.name
            - k8s.namespace.name
            - k8s.node.name
            - k8s.pod.start_time
          labels:
            - tag_name: app
              key: app
              from: pod
            - tag_name: version
              key: version
              from: pod
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.ip
          - sources:
              - from: connection

      # Memory safety — drop if over 80% of limit
      memory_limiter:
        check_interval: 1s
        limit_percentage: 80
        spike_limit_percentage: 25

      # Enrich with resource attributes
      resource:
        attributes:
          - key: cluster
            value: dev-eks-cluster
            action: upsert
          - key: region
            value: us-east-1
            action: upsert

      # Filter out health/ready/metrics spans (noise)
      # NOTE: book (Spring Boot Actuator) exposes liveness/readiness on
      # separate sub-paths, not just /actuator/health - both are hit
      # every 5-10s by the Rollout's probes, so both need excluding or
      # they'll dominate trace volume for that service.
      filter/drop_health:
        spans:
          exclude:
            match_type: strict
            attributes:
              - key: http.target
                value: /health
              - key: http.target
                value: /ready
              - key: http.target
                value: /metrics
              - key: http.target
                value: /actuator/health
              - key: http.target
                value: /actuator/health/liveness
              - key: http.target
                value: /actuator/health/readiness
              - key: http.target
                value: /actuator/prometheus

    exporters:
      # Traces → Tempo
      otlp/tempo:
        endpoint: tempo-distributor.observability.svc.cluster.local:4317
        tls:
          insecure: true

      # Logs → Loki
      loki:
        endpoint: http://loki-gateway.observability.svc.cluster.local:80/loki/api/v1/push
        tls:
          insecure: true
        default_labels_enabled:
          exporter: false
          job: true
          instance: false
          level: true
        headers:
          X-Scope-OrgID: "1"

      # Metrics → Prometheus (remote write)
      prometheusremotewrite:
        endpoint: http://kube-prometheus-stack-prometheus.observability.svc.cluster.local:9090/api/v1/write
        tls:
          insecure: true
        resource_to_telemetry_conversion:
          enabled: true

      # Debug logging (disable in prod)
      logging:
        verbosity: basic
        sampling_initial: 5
        sampling_thereafter: 200

    extensions:
      health_check:
        endpoint: 0.0.0.0:13133
      pprof:
        endpoint: 0.0.0.0:1777
      zpages:
        endpoint: 0.0.0.0:55679

    service:
      extensions: [health_check, pprof, zpages]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, k8sattributes, resource, filter/drop_health, batch]
          exporters: [otlp/tempo]

        logs:
          receivers: [otlp]
          processors: [memory_limiter, k8sattributes, resource, batch]
          exporters: [loki]

        metrics:
          receivers: [otlp, prometheus]
          processors: [memory_limiter, k8sattributes, resource, batch]
          exporters: [prometheusremotewrite]

      telemetry:
        logs:
          level: warn
        metrics:
          address: 0.0.0.0:8888