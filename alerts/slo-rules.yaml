apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: booking-slo-rules
  namespace: observability
  labels:
    app: kube-prometheus-stack
    release: booking
spec:
  groups:

  # ============================================================
  # Availability SLO Recording Rules
  # Target: 99.9%
  # ============================================================
  - name: slo.availability
    interval: 30s
    rules:

    # ----------------------------------------------------------
    # Book Service (Spring Boot)
    # ----------------------------------------------------------
    - record: slo:book_availability:ratio_rate5m
      expr: |
        1 - (
          sum(rate(http_server_requests_seconds_count{job="book",status=~"5.."}[5m]))
          /
          sum(rate(http_server_requests_seconds_count{job="book"}[5m]))
        )

    - record: slo:book_availability:ratio_rate1h
      expr: |
        1 - (
          sum(rate(http_server_requests_seconds_count{job="book",status=~"5.."}[1h]))
          /
          sum(rate(http_server_requests_seconds_count{job="book"}[1h]))
        )

    - record: slo:book_availability:ratio_rate6h
      expr: |
        1 - (
          sum(rate(http_server_requests_seconds_count{job="book",status=~"5.."}[6h]))
          /
          sum(rate(http_server_requests_seconds_count{job="book"}[6h]))
        )

    # ----------------------------------------------------------
    # Frontend
    # ----------------------------------------------------------
    - record: slo:frontend_availability:ratio_rate5m
      expr: |
        1 - (
          sum(rate(http_request_duration_seconds_count{job="frontend",status_code=~"5.."}[5m]))
          /
          sum(rate(http_request_duration_seconds_count{job="frontend"}[5m]))
        )

    - record: slo:frontend_availability:ratio_rate1h
      expr: |
        1 - (
          sum(rate(http_request_duration_seconds_count{job="frontend",status_code=~"5.."}[1h]))
          /
          sum(rate(http_request_duration_seconds_count{job="frontend"}[1h]))
        )

    - record: slo:frontend_availability:ratio_rate6h
      expr: |
        1 - (
          sum(rate(http_request_duration_seconds_count{job="frontend",status_code=~"5.."}[6h]))
          /
          sum(rate(http_request_duration_seconds_count{job="frontend"}[6h]))
        )

    # ----------------------------------------------------------
    # Auth Service
    # ----------------------------------------------------------
    - record: slo:auth_availability:ratio_rate5m
      expr: |
        1 - (
          sum(rate(http_request_duration_seconds_count{job="auth",status_code=~"5.."}[5m]))
          /
          sum(rate(http_request_duration_seconds_count{job="auth"}[5m]))
        )

    - record: slo:auth_availability:ratio_rate1h
      expr: |
        1 - (
          sum(rate(http_request_duration_seconds_count{job="auth",status_code=~"5.."}[1h]))
          /
          sum(rate(http_request_duration_seconds_count{job="auth"}[1h]))
        )

    - record: slo:auth_availability:ratio_rate6h
      expr: |
        1 - (
          sum(rate(http_request_duration_seconds_count{job="auth",status_code=~"5.."}[6h]))
          /
          sum(rate(http_request_duration_seconds_count{job="auth"}[6h]))
        )

    # ----------------------------------------------------------
    # Search Service
    # ----------------------------------------------------------
    - record: slo:search_availability:ratio_rate5m
      expr: |
        1 - (
          sum(rate(http_request_duration_seconds_count{job="search",status_code=~"5.."}[5m]))
          /
          sum(rate(http_request_duration_seconds_count{job="search"}[5m]))
        )

    - record: slo:search_availability:ratio_rate1h
      expr: |
        1 - (
          sum(rate(http_request_duration_seconds_count{job="search",status_code=~"5.."}[1h]))
          /
          sum(rate(http_request_duration_seconds_count{job="search"}[1h]))
        )

    - record: slo:search_availability:ratio_rate6h
      expr: |
        1 - (
          sum(rate(http_request_duration_seconds_count{job="search",status_code=~"5.."}[6h]))
          /
          sum(rate(http_request_duration_seconds_count{job="search"}[6h]))
        )

    # ----------------------------------------------------------
    # Payment Service
    # ----------------------------------------------------------
    - record: slo:payment_availability:ratio_rate5m
      expr: |
        1 - (
          sum(rate(http_request_duration_seconds_count{job="payment",status_code=~"5.."}[5m]))
          /
          sum(rate(http_request_duration_seconds_count{job="payment"}[5m]))
        )

    - record: slo:payment_availability:ratio_rate1h
      expr: |
        1 - (
          sum(rate(http_request_duration_seconds_count{job="payment",status_code=~"5.."}[1h]))
          /
          sum(rate(http_request_duration_seconds_count{job="payment"}[1h]))
        )

    - record: slo:payment_availability:ratio_rate6h
      expr: |
        1 - (
          sum(rate(http_request_duration_seconds_count{job="payment",status_code=~"5.."}[6h]))
          /
          sum(rate(http_request_duration_seconds_count{job="payment"}[6h]))
        )

    # ----------------------------------------------------------
    # Notification Service
    # ----------------------------------------------------------
    - record: slo:notification_availability:ratio_rate5m
      expr: |
        1 - (
          sum(rate(http_request_duration_seconds_count{job="notification",status_code=~"5.."}[5m]))
          /
          sum(rate(http_request_duration_seconds_count{job="notification"}[5m]))
        )

    - record: slo:notification_availability:ratio_rate1h
      expr: |
        1 - (
          sum(rate(http_request_duration_seconds_count{job="notification",status_code=~"5.."}[1h]))
          /
          sum(rate(http_request_duration_seconds_count{job="notification"}[1h]))
        )

    - record: slo:notification_availability:ratio_rate6h
      expr: |
        1 - (
          sum(rate(http_request_duration_seconds_count{job="notification",status_code=~"5.."}[6h]))
          /
          sum(rate(http_request_duration_seconds_count{job="notification"}[6h]))
        )


  # ============================================================
  # Latency SLO Recording Rules
  # Target: 95% requests <500ms
  # ============================================================
  - name: slo.latency
    interval: 30s
    rules:

    # ----------------------------------------------------------
    # Book Service
    # ----------------------------------------------------------
    - record: slo:book_latency_500ms:ratio_rate5m
      expr: |
        sum(rate(http_server_requests_seconds_bucket{job="book",le="0.5"}[5m]))
        /
        sum(rate(http_server_requests_seconds_count{job="book"}[5m]))

    # ----------------------------------------------------------
    # Frontend
    # ----------------------------------------------------------
    - record: slo:frontend_latency_500ms:ratio_rate5m
      expr: |
        sum(rate(http_request_duration_seconds_bucket{job="frontend",le="0.5"}[5m]))
        /
        sum(rate(http_request_duration_seconds_count{job="frontend"}[5m]))

    # ----------------------------------------------------------
    # Auth
    # ----------------------------------------------------------
    - record: slo:auth_latency_500ms:ratio_rate5m
      expr: |
        sum(rate(http_request_duration_seconds_bucket{job="auth",le="0.5"}[5m]))
        /
        sum(rate(http_request_duration_seconds_count{job="auth"}[5m]))

    # ----------------------------------------------------------
    # Search
    # ----------------------------------------------------------
    - record: slo:search_latency_500ms:ratio_rate5m
      expr: |
        sum(rate(http_request_duration_seconds_bucket{job="search",le="0.5"}[5m]))
        /
        sum(rate(http_request_duration_seconds_count{job="search"}[5m]))

    # ----------------------------------------------------------
    # Payment
    # ----------------------------------------------------------
    - record: slo:payment_latency_500ms:ratio_rate5m
      expr: |
        sum(rate(http_request_duration_seconds_bucket{job="payment",le="0.5"}[5m]))
        /
        sum(rate(http_request_duration_seconds_count{job="payment"}[5m]))

    # ----------------------------------------------------------
    # Notification
    # ----------------------------------------------------------
    - record: slo:notification_latency_500ms:ratio_rate5m
      expr: |
        sum(rate(http_request_duration_seconds_bucket{job="notification",le="0.5"}[5m]))
        /
        sum(rate(http_request_duration_seconds_count{job="notification"}[5m]))


    # ============================================================
  # Availability Burn Rate Alerts
  # ============================================================
  - name: slo.burnrate
    interval: 30s
    rules:

    # =========================
    # BOOK
    # =========================

    - alert: SLOBookAvailabilityFastBurn
      expr: |
        (1-slo:book_availability:ratio_rate5m) > (14.4*0.001)
        and
        (1-slo:book_availability:ratio_rate1h) > (14.4*0.001)
      for: 2m
      labels:
        severity: critical
        service: book
      annotations:
        summary: "Book SLO fast burn"

    - alert: SLOBookAvailabilitySlowBurn
      expr: |
        (1-slo:book_availability:ratio_rate1h) > (3*0.001)
        and
        (1-slo:book_availability:ratio_rate6h) > (3*0.001)
      for: 15m
      labels:
        severity: warning
        service: book
      annotations:
        summary: "Book SLO slow burn"


    # ============================================================
  # Latency SLO Alerts
  # ============================================================
  - name: slo.latency.alerts
    interval: 30s
    rules:

    - alert: SLOBookLatencyBudgetBurn
      expr: slo:book_latency_500ms:ratio_rate5m < 0.95
      for: 5m
      labels:
        severity: warning
        service: book
      annotations:
        summary: "Book latency SLO violated"

    - alert: SLOFrontendLatencyBudgetBurn
      expr: slo:frontend_latency_500ms:ratio_rate5m < 0.95
      for: 5m
      labels:
        severity: warning
        service: frontend
      annotations:
        summary: "Frontend latency SLO violated"

    - alert: SLOAuthLatencyBudgetBurn
      expr: slo:auth_latency_500ms:ratio_rate5m < 0.95
      for: 5m
      labels:
        severity: warning
        service: auth
      annotations:
        summary: "Auth latency SLO violated"

    - alert: SLOSearchLatencyBudgetBurn
      expr: slo:search_latency_500ms:ratio_rate5m < 0.95
      for: 5m
      labels:
        severity: warning
        service: search
      annotations:
        summary: "Search latency SLO violated"

    - alert: SLOPaymentLatencyBudgetBurn
      expr: slo:payment_latency_500ms:ratio_rate5m < 0.95
      for: 5m
      labels:
        severity: warning
        service: payment
      annotations:
        summary: "Payment latency SLO violated"

    - alert: SLONotificationLatencyBudgetBurn
      expr: slo:notification_latency_500ms:ratio_rate5m < 0.95
      for: 5m
      labels:
        severity: warning
        service: notification
      annotations:
        summary: "Notification latency SLO violated"