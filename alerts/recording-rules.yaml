apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: booking-recording-rules
  namespace: observability
  labels:
    app: kube-prometheus-stack
    release: booking
spec:
  groups:
    - name: booking.recording
      interval: 30s
      rules:

        - record: booking:cluster_cpu_usage
          expr: |
            sum(rate(container_cpu_usage_seconds_total{container!="",container!="POD"}[5m]))

        - record: booking:cluster_memory_usage
          expr: |
            sum(container_memory_working_set_bytes{container!="",container!="POD"})

        - record: booking:http_requests:rate5m
          expr: |
            sum(rate(http_server_requests_seconds_count[5m])) by (job)

        - record: booking:http_errors:rate5m
          expr: |
            sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m])) by (job)