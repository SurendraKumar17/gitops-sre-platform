# ============================================================
# Horizontal Pod Autoscaler (HPA) — Booking Platform
# Cluster: dev-eks-cluster | Namespace: booking-staging
# ============================================================

# ── Book Service (Java/Spring Boot) — Argo Rollout ───────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: book-hpa
  namespace: booking-staging
  labels:
    app: booking-app-staging-book
spec:
  scaleTargetRef:
    apiVersion: argoproj.io/v1alpha1
    kind: Rollout
    name: booking-app-staging-book
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120

