# ============================================================
# Horizontal Pod Autoscaler (HPA) — Booking Platform
# Cluster: dev-eks-cluster | Namespace: default
# ============================================================
# Scales pods based on CPU and memory usage.
# Requires: metrics-server installed on cluster
# ============================================================

# ── Book Service (Java/Spring Boot) ───────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: book-hpa
  namespace: booking-staging
  labels:
    app: book
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: book
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60       # Wait 60s before scaling up again
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60                # Add max 2 pods per minute
    scaleDown:
      stabilizationWindowSeconds: 300      # Wait 5 min before scaling down
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120               # Remove max 1 pod per 2 min

