# ============================================================
# Vertical Pod Autoscaler (VPA) — Booking Platform
# Cluster: dev-eks-cluster | Namespace: default
# ============================================================
# VPA recommends right-sized CPU/memory requests based on
# actual usage. Mode: "Off" = recommendations only (safe).
# Change to "Auto" to let VPA update requests automatically.
#
# IMPORTANT: Do NOT use VPA Auto mode together with HPA CPU/memory.
# Use VPA for right-sizing recommendations, HPA for scaling.
# ============================================================

# ── Book Service (Java/Spring Boot) ───────────────────────────
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: book-vpa
  namespace: booking-staging
  labels:
    app: book
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: booking-app-staging-book
  updatePolicy:
    updateMode: "Off"           # "Off" = recommendations only
  resourcePolicy:
    containerPolicies:
      - containerName: book
        minAllowed:
          cpu: 100m
          memory: 256Mi
        maxAllowed:
          cpu: 2000m
          memory: 4Gi
        controlledResources: ["cpu", "memory"]

---
