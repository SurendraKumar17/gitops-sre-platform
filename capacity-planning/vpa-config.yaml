# ============================================================
# Vertical Pod Autoscaler (VPA) — Booking Platform
# Cluster: dev-eks-cluster | Namespace: booking-staging
# Mode: "Off" = recommendations only (safe)
# ============================================================

# ── Book Service (Java/Spring Boot) — Argo Rollout ───────────
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: book-vpa
  namespace: booking-staging
  labels:
    app: booking-app-staging-book
spec:
  targetRef:
    apiVersion: argoproj.io/v1alpha1
    kind: Rollout
    name: booking-app-staging-book
  updatePolicy:
    updateMode: "Off"
  resourcePolicy:
    containerPolicies:
      - containerName: book
        minAllowed:
          cpu: 100m
          memory: 256Mi
        maxAllowed:
          cpu: 2000m
          memory: 4Gi
        controlledResources: ["cpu", "memory"]

---
# ── Frontend Service (Node.js) — Argo Rollout ─────────────────
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: frontend-vpa
