apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: loki
    targetRevision: "6.6.2"
    helm:
      values: |
        loki:
          auth_enabled: false
          commonConfig:
            replication_factor: 1
          storage:
            type: s3
            bucketNames:
              chunks: dev-eks-cluster-loki-chunks
              ruler: dev-eks-cluster-loki-ruler
              admin: dev-eks-cluster-loki-chunks
            s3:
              region: us-east-1
              insecure: false
          schemaConfig:
            configs:
              - from: "2024-01-01"
                store: tsdb
                object_store: s3
                schema: v13
                index:
                  prefix: loki_index_
                  period: 24h
          rulerConfig:
            storage:
              type: s3
              s3:
                region: us-east-1
                bucketnames: dev-eks-cluster-loki-ruler
            alertmanager_url: http://kube-prometheus-stack-alertmanager.observability.svc.cluster.local:9093
            enable_api: true
            ring:
              kvstore:
                store: memberlist
          limits_config:
            retention_period: 744h
            ingestion_rate_mb: 16
            ingestion_burst_size_mb: 32
            per_stream_rate_limit: 5MB
            per_stream_rate_limit_burst: 10MB
            max_streams_per_user: 10000
            max_label_names_per_series: 30
            split_queries_by_interval: 15m
            max_query_parallelism: 32
          analytics:
            reporting_enabled: false

        deploymentMode: SimpleScalable

        lokiCanary:
          enabled: false

        chunksCache:
          enabled: false

        resultsCache:
          enabled: false

        serviceAccount:
          create: true
          name: loki
          annotations:
            eks.amazonaws.com/role-arn: "arn:aws:iam::635457411372:role/dev-eks-cluster-observability"

        write:
          replicas: 1
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          persistence:
            size: 10Gi
            storageClass: gp2-wait

        read:
          replicas: 1
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi

        backend:
          replicas: 1
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          persistence:
            size: 10Gi
            storageClass: gp2-wait

        gateway:
          enabled: true
          replicas: 1
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi

        monitoring:
          serviceMonitor:
            enabled: true
            labels:
              release: kube-prometheus-stack
          selfMonitoring:
            enabled: false
          lokiCanary:
            enabled: false

        test:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true