## ============================================================
## Loki — Enterprise Values
## Mode: SimpleScalable | Backend: S3 (IRSA)
## Cluster: dev-eks-cluster | Region: us-east-1
## ============================================================

loki:
  auth_enabled: false

  commonConfig:
    replication_factor: 2

  storage:
    type: s3
    s3:
      region: us-east-1
      bucketnames: dev-eks-cluster-loki-chunks
      s3ForcePathStyle: false
      insecure: false

  storage_config:
    tsdb_shipper:
      active_index_directory: /var/loki/index
      cache_location: /var/loki/index_cache

  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: s3
        schema: v13
        index:
          prefix: loki_index_
          period: 24h

  rulerConfig:
    storage:
      type: s3
      s3:
        region: us-east-1
        bucketnames: dev-eks-cluster-loki-ruler
    alertmanager_url: http://kube-prometheus-stack-alertmanager.observability.svc.cluster.local:9093
    enable_api: true
    ring:
      kvstore:
        store: memberlist

  limits_config:
    retention_period: 744h
    ingestion_rate_mb: 16
    ingestion_burst_size_mb: 32
    per_stream_rate_limit: 5MB
    per_stream_rate_limit_burst: 10MB
    max_streams_per_user: 10000
    max_label_names_per_series: 30
    split_queries_by_interval: 15m
    max_query_parallelism: 32

  analytics:
    reporting_enabled: false

deploymentMode: SimpleScalable

## ── Service accounts with IRSA ───────────────────────────────
serviceAccount:
  create: true
  name: loki
  annotations:
    eks.amazonaws.com/role-arn: "arn:aws:iam::635457411372:role/dev-eks-cluster-observability"

## ── Write ─────────────────────────────────────────────────────
write:
  replicas: 2
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  persistence:
    size: 10Gi
    storageClass: gp2
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              app.kubernetes.io/component: write
          topologyKey: kubernetes.io/hostname

## ── Read ──────────────────────────────────────────────────────
read:
  replicas: 2
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              app.kubernetes.io/component: read
          topologyKey: kubernetes.io/hostname

## ── Backend ───────────────────────────────────────────────────
backend:
  replicas: 2
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  persistence:
    size: 10Gi
    storageClass: gp2

## ── Gateway ───────────────────────────────────────────────────
gateway:
  enabled: true
  replicas: 2
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

## ── Monitoring ────────────────────────────────────────────────
monitoring:
  serviceMonitor:
    enabled: true
    labels:
      release: kube-prometheus-stack
  selfMonitoring:
    enabled: false
  lokiCanary:
    enabled: false

test:
  enabled: false