# ServiceMonitor for all microservices
# Apply to: microservices-cd-platform/helm/booking-app/templates/servicemonitors.yaml
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ .Release.Name }}-node-services
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "booking.labels" . | nindent 4 }}
    release: prometheus-stack   # must match Prometheus operator selector
spec:
  selector:
    matchExpressions:
      - key: app
        operator: In
        values: [auth, frontend, notification]
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ .Release.Name }}-go-services
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "booking.labels" . | nindent 4 }}
    release: prometheus-stack
spec:
  selector:
    matchExpressions:
      - key: app
        operator: In
        values: [search, payment]
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ .Release.Name }}-java-services
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "booking.labels" . | nindent 4 }}
    release: prometheus-stack
spec:
  selector:
    matchExpressions:
      - key: app
        operator: In
        values: [book]
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s
      scrapeTimeout: 10s