# ServiceMonitors for all four booking services.
# kube-prometheus-stack picks these up because serviceMonitorSelectorNilUsesHelmValues: false.
#
# book   → port "actuator" (9090)  path /actuator/prometheus
# user   → port "http"    (3002)  path /metrics
# search → port "http"    (3003)  path /metrics
# frontend→ port "http"   (3000)  path /metrics

---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: book-service-monitor
  namespace: observability
  labels:
    release: kube-prometheus-stack   # must match the Helm release label selector
spec:
  namespaceSelector:
    matchNames:
      - default                      # adjust to your app namespace
  selector:
    matchLabels:
      app: book
  endpoints:
    - port: actuator                 # named port on the book Service
      path: /actuator/prometheus
      interval: 15s
      scrapeTimeout: 10s
      relabelings:
        - sourceLabels: [__meta_kubernetes_pod_name]
          targetLabel: pod
        - sourceLabels: [__meta_kubernetes_namespace]
          targetLabel: namespace

---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: user-service-monitor
  namespace: observability
  labels:
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - default
  selector:
    matchLabels:
      app: user
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s
      relabelings:
        - sourceLabels: [__meta_kubernetes_pod_name]
          targetLabel: pod
        - sourceLabels: [__meta_kubernetes_namespace]
          targetLabel: namespace

---
apiVersion: monitoring.coreos.com/v1
