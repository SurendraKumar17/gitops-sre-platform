apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: observability
  labels:
    grafana_datasource: "1"

data:
  datasources.yaml: |
    apiVersion: 1

    datasources:

      - name: Prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: http://kube-prometheus-stack-prometheus.observability.svc.cluster.local:9090
        isDefault: true
        editable: false

      - name: Loki
        uid: loki
        type: loki
        access: proxy
        url: http://loki-gateway.observability.svc.cluster.local
        editable: false

      - name: Tempo
        uid: tempo
        type: tempo
        access: proxy
        url: http://tempo-query-frontend.observability.svc.cluster.local:3100
        editable: false

        jsonData:
          nodeGraph:
            enabled: true

          serviceMap:
            datasourceUid: prometheus

          tracesToLogs:
            datasourceUid: loki
            tags:
              - namespace
              - pod
              - service.name

          search:
            hide: false