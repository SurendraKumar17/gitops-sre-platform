apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: capacity-planning
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: https://github.com/SurendraKumar17/k8s-observability-platform
    targetRevision: main
    path: capacity-planning
    directory:
      recurse: true
      include: "*.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: booking-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true