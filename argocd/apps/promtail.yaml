apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: promtail
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: promtail
    targetRevision: "6.15.5"
    helm:
      values: |
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi

        config:
          logLevel: warn
          serverPort: 3101
          clients:
            - url: http://loki-gateway.observability.svc.cluster.local/loki/api/v1/push
              tenant_id: "1"
              backoff_config:
                min_period: 500ms
                max_period: 5m
                max_retries: 10
          snippets:
            pipelineStages:
              - cri: {}
            scrapeConfigs: |
              - job_name: kubernetes-pods
                kubernetes_sd_configs:
                  - role: pod
                relabel_configs:
                  - source_labels: [__meta_kubernetes_pod_phase]
                    action: keep
                    regex: Running
                  - source_labels: [__meta_kubernetes_namespace]
                    action: keep
                    regex: (booking-staging|observability)
                  - source_labels: [__meta_kubernetes_namespace]
                    target_label: namespace
                  - source_labels: [__meta_kubernetes_pod_label_app]
                    target_label: app
                  - source_labels: [__meta_kubernetes_pod_name]
                    target_label: pod
                  - source_labels: [__meta_kubernetes_pod_container_name]
                    target_label: container
                  - source_labels: [__meta_kubernetes_pod_node_name]
                    target_label: node
                  - source_labels: [__meta_kubernetes_pod_label_rollouts_pod_template_hash]
                    target_label: rollouts_pod_template_hash
                  - source_labels: [__meta_kubernetes_pod_annotation_kubernetes_io_config_hash, __meta_kubernetes_pod_container_name]
                    target_label: __path__
                    separator: /
                    replacement: /var/log/pods/*$1*/$2/*.log

        rbac:
          create: true
          pspEnabled: false

        serviceAccount:
          create: true
          name: promtail

        tolerations:
          - key: node-role.kubernetes.io/master
            operator: Exists
            effect: NoSchedule
          - key: node-role.kubernetes.io/control-plane
            operator: Exists
            effect: NoSchedule

        serviceMonitor:
          enabled: true
          labels:
            release: kube-prometheus-stack

  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m